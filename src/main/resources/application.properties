# Server Configuration
server.port=8080
server.servlet.context-path=/

# OpenAI Configuration
openai.api.url=https://api.openai.com/v1/chat/completions
openai.api.model.recipe=${OPENAI_MODEL_RECIPE:gpt-4o-mini}
openai.api.model.tips=${OPENAI_MODEL_TIPS:gpt-4o-mini}
openai.api.model.validation=${OPENAI_MODEL_VALIDATION:gpt-4o-mini}
openai.api.default-key=${OPENAI_API_KEY:}
app.default-key.max-recipes-per-session=${APP_DEFAULT_KEY_MAX_RECIPES:5}
app.trial.cookie-enabled=true
app.asset-version=1.3.0
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Security Configuration
# Set APP_ENCRYPTION_KEY in .env (min 32 chars). Dev profile supplies a local-only default.
app.encryption.key=${APP_ENCRYPTION_KEY:}

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
# Use APP_SESSION_COOKIE_SECURE (not SERVER_SSL_ENABLED — that name enables Tomcat SSL via Spring Boot binding).
server.servlet.session.cookie.secure=${APP_SESSION_COOKIE_SECURE:false}

# Comma-separated origins for CORS (set to your Railway URL in production)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080}

# Logging (override in application-dev.properties or application-prod.properties)
logging.level.com.recipeassistant=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null

# Rate Limiting
app.rate-limit.requests-per-minute=10

# Request size limits
server.tomcat.max-http-form-post-size=1MB
spring.servlet.multipart.max-request-size=1MB

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/recipe_assistant
spring.datasource.username=recipe_user
spring.datasource.password=recipe_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Flyway schema migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
