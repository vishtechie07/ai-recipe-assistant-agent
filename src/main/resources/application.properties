# Server Configuration
server.port=8080
server.servlet.context-path=/

# OpenAI Configuration
openai.api.url=https://api.openai.com/v1/chat/completions
openai.api.default-key=${OPENAI_API_KEY:}
app.default-key.max-recipes-per-session=${APP_DEFAULT_KEY_MAX_RECIPES:5}

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Security Configuration
# Basic auth disabled - using session-based authentication with encrypted API keys
app.encryption.key=${APP_ENCRYPTION_KEY:your-super-secret-encryption-key-change-in-production-32-chars}

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
# Use APP_SESSION_COOKIE_SECURE (not SERVER_SSL_ENABLED — that name enables Tomcat SSL via Spring Boot binding).
server.servlet.session.cookie.secure=${APP_SESSION_COOKIE_SECURE:false}

# Logging
logging.level.com.recipeassistant=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null

# Rate Limiting
app.rate-limit.requests-per-minute=10

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/recipe_assistant
spring.datasource.username=recipe_user
spring.datasource.password=recipe_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
