# Railway / reverse-proxy deployment: HTTPS terminates at the edge, not in Tomcat.
server.port=${PORT:8080}
server.ssl.enabled=false
server.forward-headers-strategy=framework

# Secure session cookies when users reach the app over HTTPS (set APP_SESSION_COOKIE_SECURE=true on Railway).
server.servlet.session.cookie.secure=${APP_SESSION_COOKIE_SECURE:true}

# Quieter logs in production
logging.level.com.recipeassistant=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
spring.jpa.show-sql=false
