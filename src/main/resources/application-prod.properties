# Railway / reverse-proxy deployment: HTTPS terminates at the edge, not in Tomcat.
server.port=${PORT:8080}
server.ssl.enabled=false
server.forward-headers-strategy=framework

# Secure session cookies when users reach the app over HTTPS (set APP_SESSION_COOKIE_SECURE=true on Railway).
server.servlet.session.cookie.secure=${APP_SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=lax
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}

# Production defaults (Railway: set SPRING_PROFILES_ACTIVE=prod or rely on RAILWAY_ENVIRONMENT auto-detect)
logging.level.com.recipeassistant=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.thymeleaf.cache=true

server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
